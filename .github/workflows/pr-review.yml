name: PR Review

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.coverage.outputs.pct }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build, test, and checkstyle
        run: mvn verify --no-transfer-progress

      - name: Extract coverage percentage
        id: coverage
        run: |
          PCT=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('target/site/jacoco/jacoco.xml')
          root = tree.getroot()
          counters = {c.get('type'): c for c in root.findall('./counter')}
          inst = counters.get('INSTRUCTION')
          if inst is not None:
              covered = int(inst.get('covered', 0))
              missed = int(inst.get('missed', 0))
              total = covered + missed
              pct = round(covered / total * 100, 1) if total > 0 else 0
              print(pct)
          else:
              print(0)
          " 2>/dev/null || echo "0")
          echo "pct=${PCT}" >> "$GITHUB_OUTPUT"

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

  ai-review:
    name: AI Architecture Review
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install review agent dependencies
        run: pip install "google-generativeai>=0.7.0" requests

      - name: Run AI review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          COVERAGE: ${{ needs.build-and-test.outputs.coverage }}
        run: python agent/review.py
